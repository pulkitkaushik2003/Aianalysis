<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | InsightAnalytics</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
      50% { box-shadow: 0 0 40px rgba(56, 189, 248, 0.8); }
    }

    .animate-fadeUp {
      animation: fadeUp 1s ease forwards;
    }

    .delay-1 { animation-delay: 0.3s; }
    .delay-2 { animation-delay: 0.6s; }
    .delay-3 { animation-delay: 0.9s; }
    .delay-4 { animation-delay: 1.2s; }

    .pulse-glow {
      animation: pulseGlow 2s infinite;
    }

    .animate-word {
      opacity: 0;
      animation: fadeUp 1s ease forwards;
    }

    .delay-word-1 { animation-delay: 0.2s; }
    .delay-word-2 { animation-delay: 0.4s; }
    .delay-word-3 { animation-delay: 0.6s; }
    .delay-word-4 { animation-delay: 0.8s; }
    .delay-word-5 { animation-delay: 1.0s; }

    body {
      font-family: 'Inter', sans-serif;
    }

    .hero-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .service-card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .project-card:hover img {
      transform: scale(1.1);
    }

    .project-card img {
      transition: transform 0.5s ease;
    }
  </style>
</head>

<body class="bg-slate-950 text-white overflow-x-hidden">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-6 md:px-20 py-6 animate-fadeUp sticky top-0 bg-slate-950/90 backdrop-blur-md z-50">
  <h1 class="text-2xl font-bold text-sky-400 flex items-center gap-2">
    <i data-lucide="bar-chart-3" class="w-8 h-8"></i>
    InsightAnalytics
  </h1>

  <ul class="hidden md:flex gap-10 text-gray-300">
    <li class="hover:text-sky-400 transition cursor-pointer">Home</li>
   <li class="transition">
  <a href="/service" class="hover:text-sky-400 cursor-pointer">
    Services
  </a>
</li>

     <li class="hover:text-sky-400 transition">
  <a href="/about" class="hover:text-sky-400 cursor-pointer">
    About
  </a>
</li>
    <li class="hover:text-sky-400 transition">
  <a href="/contact" class="hover:text-sky-400 cursor-pointer">
    Contact
  </a>
</li>

  </ul>

  <button class="bg-sky-400 text-black px-6 py-2 rounded-lg font-medium hover:bg-sky-300 hover:scale-105 transition pulse-glow">
    <a href="/login" class="hover:text-sky-400 cursor-pointer">
    Get Consultation
  </a>
    
  </button>

  <!-- Mobile Menu Toggle -->
  <div class="md:hidden">
    <button id="menu-toggle" class="text-gray-300 hover:text-white">
      <i data-lucide="menu" class="w-6 h-6"></i>
    </button>
  </div>
</nav>

<!-- Mobile Menu -->
<div id="mobile-menu" class="hidden md:hidden bg-slate-900 px-6 py-4">
  <ul class="flex flex-col gap-4 text-gray-300">
    <li class="hover:text-sky-400 transition cursor-pointer">Home</li>
    <li class="transition">
  <a href="/service" class="hover:text-sky-400 cursor-pointer">
    Services
  </a>
</li>

    <li class="hover:text-sky-400 transition cursor-pointer">About</li>
    <li class="hover:text-sky-400 transition cursor-pointer">Contact</li>
  </ul>
</div>
<div class="bg-slate-900 w-full max-w-md p-10 rounded-2xl shadow-2xl animate-fadeUp">

  <h1 class="text-3xl font-extrabold text-center text-sky-400 mb-2">
    InsightAnalytics
  </h1>
  <p class="text-center text-gray-400 mb-8">
    Sign in to access your dashboard
  </p>

  <!-- FLASH MESSAGES -->
  <p th:if="${successMessage}" class="bg-green-500/20 text-green-300 text-sm p-3 rounded-lg mb-4 text-center">[[${successMessage}]]</p>
  <p th:if="${infoMessage}"    class="bg-sky-500/10 text-sky-300 text-sm p-3 rounded-lg mb-4 text-center">[[${infoMessage}]]</p>
  <p th:if="${errorMessage}"   class="bg-red-500/20 text-red-400 text-sm p-3 rounded-lg mb-4 text-center">[[${errorMessage}]]</p>

  <!-- ✅ LOGIN FORM (ONLY LOGIC ADDED) -->
  <form action="/login" method="post">

    <!-- EMAIL -->
    <div class="mb-5 animate-fadeUp delay-1">
      <label class="text-gray-400 text-sm">Email Address</label>
      <input type="email"
        name="username"     
        required
        placeholder="admin@insight.com"
        class="w-full mt-2 p-3 rounded-lg bg-slate-800 outline-none focus:ring-2 focus:ring-sky-400">
    </div>

    <!-- PASSWORD -->
    <div class="mb-6 animate-fadeUp delay-2">
      <label class="text-gray-400 text-sm">Password</label>
      <input type="password"
        name="password"     
        required
        placeholder="••••••••"
        class="w-full mt-2 p-3 rounded-lg bg-slate-800 outline-none focus:ring-2 focus:ring-sky-400">
    </div>

    <!-- LOGIN BUTTON -->
    <button type="submit"
      class="w-full bg-sky-400 text-black py-3 rounded-xl font-semibold hover:scale-105 transition glow">
      Login
    </button>

  </form>

  <div class="flex justify-between items-center mt-6 text-sm text-gray-400">
    <a href="/forgot-password" class="hover:text-sky-400 cursor-pointer">Forgot password?</a>
    <a href="/signup" class="hover:text-sky-400 cursor-pointer">Create account</a>
  </div>

  <p class="text-center text-xs text-gray-500 mt-6">
    Demo Mode • MongoDB backend connected
  </p>

</div>

</body>
</html>
