<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | InsightAnalytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeUp { animation: fadeUp 1s ease forwards; }
    .glow { box-shadow: 0 0 30px rgba(56,189,248,0.6); }
  </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center text-white">
<div class="bg-slate-900 w-full max-w-md p-10 rounded-2xl shadow-2xl animate-fadeUp">
  <h1 class="text-3xl font-extrabold text-center text-sky-400 mb-2">Reset Password</h1>
  <p class="text-center text-gray-400 mb-6">Choose a new password for your account.</p>

  <form th:action="@{/reset-password}" method="post">
    <input type="hidden" name="token" th:value="${token}" />

    <div class="mb-4">
      <label class="text-gray-400 text-sm">New Password</label>
      <input type="password" name="password" required placeholder="••••••••"
             class="w-full mt-2 p-3 rounded-lg bg-slate-800 outline-none focus:ring-2 focus:ring-sky-400">
    </div>

    <button type="submit" class="w-full bg-sky-400 text-black py-3 rounded-xl font-semibold hover:scale-105 transition glow">Set new password</button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">Back to <a href="/login" class="text-sky-400 hover:underline">login</a></p>
</div>
</body>
</html>
