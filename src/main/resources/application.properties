# Secured application.properties - Use environment variables for secrets
# DO NOT commit real keys/passwords. Set via env vars or VSCode launch.json.

# ===============================
# Server Configuration
# ===============================
spring.application.name=aianalysis
spring.config.import=optional:file:.env[.properties]

# ===============================
# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:}
# ===============================

# ===============================
# Thymeleaf Configuration
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===============================
# Logging
# ===============================
logging.level.com.example.aianalysis=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.org.springframework.security=INFO
logging.level.org.mongodb.driver.cluster=WARN
logging.level.org.mongodb.driver.connection=WARN
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===============================
# OpenAI Configuration
# ===============================
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini
openai.base-url=https://api.openai.com/v1
gemini.api.key=${GEMINI_API_KEY:${GOOGLE_API_KEY:}}
gemini.model=gemini-2.5-flash-lite
gemini.chat.model=${gemini.model}
gemini.image.model=${gemini.model}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta


# ===============================
# SMTP (GMAIL)s
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${SPRING_MAIL_FROM:${spring.mail.username:}}
